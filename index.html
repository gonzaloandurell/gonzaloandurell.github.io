<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gonzalo Andurell | Game Developer</title>
    <meta name="description" content="Portfolio profesional de Gonzalo Andurell, desarrollador de videojuegos especializado en Unity y C#.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <header>
        <nav>
            <div class="logo">GA<span>.</span></div>
            <ul class="nav-links">
                <li><a href="#home">Inicio</a></li>
                <li><a href="#about">Sobre Mí</a></li>
                <li><a href="#projects">Proyectos</a></li>
                <li><a href="#contact">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <span class="badge">Game Developer</span>
                <h1 class="hero-title">Hola, soy <br> <span class="highlight">Gonzalo Andurell</span></h1>
                <p class="hero-subtitle">Transformando ideas en experiencias interactivas insanas. Especializado en mecánicas de juego, sistemas de UI y Unity C#.</p>
                <div class="hero-cta">
                    <a href="#projects" class="btn btn-primary">Ver mis Proyectos</a>
                    <a href="#contact" class="btn btn-secondary">Contactar</a>
                </div>
            </div>
        </section>

        <!-- Aquí se pueden agregar más secciones en el futuro (Sobre mí, Proyectos, etc.) -->
    </main>

    <script>
        // Efecto parallax simple para los orbs de fondo
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.glow-orb');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            orbs[0].style.transform = `translate(${x * 50}px, ${y * 50}px)`;
            orbs[1].style.transform = `translate(${x * -40}px, ${y * -40}px)`;
        });
    </script>
</body>
</html>
